baseURL = 'https://illinoisshuffleboard.org/'
languageCode = 'en-us'
title = 'Illinois Shuffleboard Association'

[build]
  [build.buildStats]
    enable = true

  [[build.cachebusters]]
    source = "assets/css/main\\.css"
    target = "css"
  [[build.cachebusters]]
    source = "(postcss|tailwind)\\.config\\.js"
    target = "css"
  [[build.cachebusters]]
    source = "hugo_stats\\.json"
    target = "css"

[mediaTypes]
  [mediaTypes."application/yaml"]
    suffixes = ["yml"]

[outputFormats]
  [outputFormats.YAML]
    mediaType = "application/yaml"
    baseName = "config"
    isPlainText = true
    notAlternative = true

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
