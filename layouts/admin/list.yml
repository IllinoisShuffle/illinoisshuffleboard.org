{{ with os.Getenv "HUGO_LOCAL_BACKEND" -}}
local_backend: true
{{ end -}}
backend:
  name: git-gateway
  branch: main
  accept_roles:
    - admin

media_folder: "static/img/posts"
public_folder: "/img/posts"

collections:
  - name: "posts"
    label: "News Posts"
    label_singular: "News Post"
    description: "ILSA news and announcements"
    summary: '{{ print "{{title}}" }} — {{ print "{{date}}" }}'
    folder: "content/posts"
    create: true
    slug: '{{ print "{{year}}-{{month}}-{{day}}-{{slug}}" }}'
    extension: "md"
    format: "toml-frontmatter"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime", format: "YYYY-MM-DD" }
      - { label: "Expiry Date", name: "expiryDate", widget: "datetime", format: "YYYY-MM-DD", required: false, hint: "Post will be hidden after this date" }
      - { label: "Draft", name: "draft", widget: "boolean", default: false }
      - { label: "Body", name: "body", widget: "markdown" }
